name: Build and Release EXE

on:
  push:
    branches: [ "main" ]
    paths:
      - 'gui_qt.py'
      - 'requirements.txt'
      - '.github/workflows/build-exe.yml'
      - 'icon.py'
      - 'Neibu.py'
      - 'data01.py'
      - 'main.py'

permissions:
  contents: write

jobs:
  build:
    name: Build EXE
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v5

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Generate icon
      run: |
        python icon.py

    - name: Build EXE
      run: |
        pyinstaller --noconfirm --onefile --windowed --icon=icon.ico --name "战火公会赛季数据分析工具" gui_qt.py

    - name: Create release and upload asset
      uses: softprops/action-gh-release@v3
      with:
        tag_name: v${{ github.run_number }}
        name: 战火公会数据分析工具 v${{ github.run_number }}
        draft: false
        prerelease: false
        files: dist/战火公会赛季数据分析工具.exe
